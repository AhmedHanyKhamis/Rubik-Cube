<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rubik's Cube Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-panel">
        <div class="panel">
            <div class="button-grid">
                <button id="btn-scramble" class="btn btn-primary">Scramble</button>
                <button id="btn-solution" class="btn btn-solution">Get Solution</button>
            </div>

            <button id="btn-reset" class="btn btn-reset">Reset</button>

            <div class="button-grid">
                <button id="btn-next" class="btn btn-secondary">Next Step</button>
                <button id="btn-auto" class="btn btn-action">Auto Solve</button>
            </div>

            <div class="button-grid">
                <button id="btn-pause" class="btn btn-warning">Pause</button>
                <button id="btn-resume" class="btn btn-warning">Resume</button>
            </div>
        </div>

        <div id="solution-card" class="panel hidden">
            <div class="solution-header">
                <h2 class="solution-title">Solution</h2>
                <span id="moves-count" class="moves-count">0 moves</span>
            </div>

            <div class="solution-panel">
                <div id="solution-text" class="solution-text"></div>
                <div id="solution-badges" class="badge-list custom-scrollbar"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script src="js/script.js"></script>
</body>
</html>
