<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rubik's Cube Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #e2e8f0; 
            touch-action: none;
            font-family: 'Inter', system-ui, sans-serif;
        }
        #game-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body>

    <!-- 3D Container -->
    <div id="game-container" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay -->
    <div id="ui-panel" class="absolute top-4 right-4 sm:top-6 sm:right-6 w-[calc(100%-2rem)] sm:w-80 max-h-[95vh] flex flex-col gap-4 z-20 pointer-events-none overflow-y-auto custom-scrollbar pb-4">
        
        <!-- Control Panel -->
        <div class="bg-white rounded-[20px] shadow-xl p-4 pointer-events-auto flex flex-col gap-3">
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-scramble" class="bg-[#4a89ff] hover:bg-[#3b7eed] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95">Scramble</button>
                <button id="btn-solution" class="bg-[#ab5af4] hover:bg-[#9d4fed] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95">Get Solution</button>
            </div>
            
            <button id="btn-reset" class="w-full border-2 border-gray-100 hover:bg-gray-50 text-gray-800 font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95">Reset</button>
            
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-next" class="bg-[#f0f2f5] hover:bg-[#e4e6eb] text-gray-800 font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95 disabled:opacity-50">Next Step</button>
                <button id="btn-auto" class="bg-[#1cc065] hover:bg-[#18a858] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95 disabled:opacity-50">Auto Solve</button>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-pause" class="bg-[#f3cc77] hover:bg-[#eabf66] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95 disabled:opacity-50">Pause</button>
                <button id="btn-resume" class="bg-[#f3cc77] hover:bg-[#eabf66] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition transform active:scale-95 disabled:opacity-50">Resume</button>
            </div>
        </div>

        <!-- Solution Panel -->
        <div id="solution-card" class="bg-white rounded-[20px] shadow-xl p-5 pointer-events-auto hidden flex-col gap-4 border border-gray-100">
            <div class="flex justify-between items-center">
                <h2 class="text-[22px] font-extrabold text-gray-900 tracking-tight">Solution</h2>
                <span id="moves-count" class="bg-[#f0f2f5] text-gray-600 text-[13px] py-1.5 px-3 rounded-full font-bold shadow-inner">0 moves</span>
            </div>
            
            <div class="bg-white border-2 border-[#f0f2f5] rounded-xl p-4 shadow-sm">
                <div id="solution-text" class="text-gray-800 font-mono text-sm leading-relaxed tracking-wider font-bold min-h-[40px]">
                    <!-- Text solution goes here -->
                </div>

                <div id="solution-badges" class="flex flex-wrap gap-2 mt-4 max-h-48 overflow-y-auto custom-scrollbar pr-1">
                    <!-- Badges will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#e2e8f0');

        // دالة حساب موقع المكعب والكاميرا لتجنب التشابك مع القوائم
        const getOffsetX = () => window.innerWidth > 600 ? -2.0 : 0;

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(getOffsetX() + 6.5, 5.5, 8.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 4;
        controls.maxDistance = 15;
        // هنا تم حل مشكلة "النقطة الثابتة" عن طريق جعل محور الدوران هو مركز المكعب دائماً
        controls.target.set(getOffsetX(), 0, 0); 
        controls.update();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.4);
        backLight.position.set(-10, -20, -10);
        scene.add(backLight);

        const cubeGroup = new THREE.Group();
        cubeGroup.position.x = getOffsetX(); 
        scene.add(cubeGroup);
        
        const pivot = new THREE.Group();
        cubeGroup.add(pivot);

        const cubies = [];
        
        const colors = {
            right: 0xB71234, left: 0xFF5800, top: 0xFFFFFF,
            bottom: 0xFFD500, front: 0x009B48, back: 0x0046AD, core: 0x111111
        };

        const cubieSize = 0.96;
        const geometry = new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize);

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const materials = [
                        new THREE.MeshPhysicalMaterial({ color: x === 1 ? colors.right : colors.core, roughness: 0.1, clearcoat: 0.5 }),
                        new THREE.MeshPhysicalMaterial({ color: x === -1 ? colors.left : colors.core, roughness: 0.1, clearcoat: 0.5 }),
                        new THREE.MeshPhysicalMaterial({ color: y === 1 ? colors.top : colors.core, roughness: 0.1, clearcoat: 0.5 }),
                        new THREE.MeshPhysicalMaterial({ color: y === -1 ? colors.bottom : colors.core, roughness: 0.1, clearcoat: 0.5 }),
                        new THREE.MeshPhysicalMaterial({ color: z === 1 ? colors.front : colors.core, roughness: 0.1, clearcoat: 0.5 }),
                        new THREE.MeshPhysicalMaterial({ color: z === -1 ? colors.back : colors.core, roughness: 0.1, clearcoat: 0.5 })
                    ];

                    const cubie = new THREE.Mesh(geometry, materials);
                    cubie.position.set(x, y, z);
                    cubie.userData = { initialX: x, initialY: y, initialZ: z };
                    cubeGroup.add(cubie);
                    cubies.push(cubie);
                }
            }
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let isDragging = false;
        let isAnimating = false;
        let activeAxis = null;
        let activeSlice = null;
        
        let startIntersect = null;
        let dragPlane = new THREE.Plane();
        let startPoint = new THREE.Vector3();
        let hitNormal = new THREE.Vector3();

        let moveHistory = [];
        let solutionSequence = [];
        let currentStepIndex = 0;
        let isAutoSolving = false;
        let autoSolveTimer = null;

        function optimizeHistory(history) {
            let optimized = [];
            for (let i = 0; i < history.length; i++) {
                let currentMove = history[i];
                if (optimized.length > 0) {
                    let prevMove = optimized[optimized.length - 1];
                    if (prevMove.axis === currentMove.axis && prevMove.slice === currentMove.slice) {
                        let newTurns = (prevMove.turns + currentMove.turns) % 4;
                        if (newTurns === 3) newTurns = -1;
                        if (newTurns === -3) newTurns = 1;
                        if (newTurns === -2) newTurns = 2;
                        
                        optimized.pop(); 
                        if (newTurns !== 0) { 
                            optimized.push({
                                axis: currentMove.axis,
                                slice: currentMove.slice,
                                turns: newTurns,
                                angle: newTurns * (Math.PI / 2)
                            });
                        }
                        continue;
                    }
                }
                optimized.push(currentMove);
            }
            return optimized;
        }

        function getMoveNotation(axis, slice, angle) {
            let turns = Math.round(angle / (Math.PI / 2));
            turns = turns % 4;
            if (turns === 0) return null;
            
            if (turns === 3) turns = -1;
            if (turns === -3) turns = 1;

            const isPositive = turns > 0;
            const absTurns = Math.abs(turns);

            let face = '';
            if (axis === 'x') {
                if (slice === 1) face = 'R'; else if (slice === -1) face = 'L'; else face = 'M';
            } else if (axis === 'y') {
                if (slice === 1) face = 'U'; else if (slice === -1) face = 'D'; else face = 'E';
            } else if (axis === 'z') {
                if (slice === 1) face = 'F'; else if (slice === -1) face = 'B'; else face = 'S';
            }
            if (!face) return null;

            let isClockwise = true;
            if (face === 'R' || face === 'U' || face === 'F') isClockwise = !isPositive;
            else if (face === 'L' || face === 'D' || face === 'B') isClockwise = isPositive;
            else {
                if (face === 'M') isClockwise = isPositive;
                if (face === 'E') isClockwise = isPositive;
                if (face === 'S') isClockwise = !isPositive;
            }

            if (absTurns === 2) return face + '2';
            return face + (isClockwise ? '' : "'");
        }

        function onPointerDown(event) {
            if (event.target !== renderer.domElement) return;
            if (isAnimating || isAutoSolving) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubies);

            if (intersects.length > 0) {
                isDragging = true;
                controls.enabled = false;
                startIntersect = intersects[0];
                startPoint.copy(startIntersect.point);

                hitNormal.copy(startIntersect.face.normal);
                hitNormal.transformDirection(startIntersect.object.matrixWorld).normalize();

                hitNormal.x = Math.round(hitNormal.x);
                hitNormal.y = Math.round(hitNormal.y);
                hitNormal.z = Math.round(hitNormal.z);

                dragPlane.setFromNormalAndCoplanarPoint(hitNormal, startPoint);
            }
        }

        function onPointerMove(event) {
            if (!isDragging || isAnimating) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const currentPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, currentPoint);

            if (!currentPoint) return;

            const drag3D = currentPoint.clone().sub(startPoint);

            if (!activeAxis && drag3D.length() > 0.1) {
                const cross = hitNormal.clone().cross(drag3D);
                const absX = Math.abs(cross.x), absY = Math.abs(cross.y), absZ = Math.abs(cross.z);

                if (absX > absY && absX > absZ) activeAxis = 'x';
                else if (absY > absX && absY > absZ) activeAxis = 'y';
                else activeAxis = 'z';

                activeSlice = Math.round(startIntersect.object.position[activeAxis]);

                pivot.rotation.set(0, 0, 0);
                pivot.updateMatrixWorld();
                
                const cubiesToMove = cubies.filter(c => Math.round(c.position[activeAxis]) === activeSlice);
                cubiesToMove.forEach(c => pivot.attach(c));
            }

            if (activeAxis) {
                const axisVector = new THREE.Vector3();
                axisVector[activeAxis] = 1;

                const tangent = axisVector.clone().cross(hitNormal).normalize();
                const dot = drag3D.dot(tangent);
                
                const angle = dot * 1.25; 
                pivot.rotation[activeAxis] = angle;
            }
        }

        function onPointerUp() {
            if (!isDragging) return;
            isDragging = false;
            controls.enabled = true;

            if (activeAxis && !isAnimating) {
                isAnimating = true;
                const currentAngle = pivot.rotation[activeAxis];
                const targetAngle = Math.round(currentAngle / (Math.PI / 2)) * (Math.PI / 2);

                new TWEEN.Tween(pivot.rotation)
                    .to({ [activeAxis]: targetAngle }, 250)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onComplete(() => finalizeRotation(true))
                    .start();
            }
        }

        function finalizeRotation(recordMove = true) {
            if (activeAxis !== null) {
                let finalAngle = pivot.rotation[activeAxis];
                let turns = Math.round(finalAngle / (Math.PI/2));
                turns = turns % 4;
                if (turns === 3) turns = -1;
                if (turns === -3) turns = 1;
                if (turns === -2) turns = 2;
                
                if (recordMove && turns !== 0) {
                    moveHistory.push({ 
                        axis: activeAxis, 
                        slice: activeSlice, 
                        turns: turns, 
                        angle: turns * (Math.PI/2) 
                    });
                    
                    moveHistory = optimizeHistory(moveHistory);

                    if (!isAutoSolving && solutionSequence.length > 0) {
                        document.getElementById('solution-card').classList.add('hidden');
                        solutionSequence = [];
                    }
                }
            }

            const children = pivot.children.slice();
            children.forEach(c => {
                cubeGroup.attach(c);
                c.updateMatrix();
                
                const elements = c.matrix.elements;
                for (let i = 0; i < 16; i++) elements[i] = Math.round(elements[i]);
                c.matrix.decompose(c.position, c.quaternion, c.scale);
            });
            
            pivot.rotation.set(0, 0, 0);
            activeAxis = null;
            activeSlice = null;
            isAnimating = false; // تم الفك والربط بالكامل بأمان
        }

        function scramble() {
            if (isAnimating || isDragging) return;
            isAnimating = true;
            controls.enabled = false;
            
            pauseAutoSolve();
            document.getElementById('solution-card').classList.add('hidden');
            moveHistory = []; 

            let moves = 25;
            const axes = ['x', 'y', 'z'];
            const slices = [-1, 0, 1];
            const directions = [Math.PI / 2, -Math.PI / 2];

            function performRandomMove() {
                if (moves === 0) {
                    isAnimating = false;
                    controls.enabled = true;
                    return;
                }
                moves--;

                activeAxis = axes[Math.floor(Math.random() * 3)];
                activeSlice = slices[Math.floor(Math.random() * 3)];
                const targetAngle = directions[Math.floor(Math.random() * 2)];

                pivot.rotation.set(0, 0, 0);
                pivot.updateMatrixWorld();
                
                const cubiesToMove = cubies.filter(c => Math.round(c.position[activeAxis]) === activeSlice);
                cubiesToMove.forEach(c => pivot.attach(c));

                new TWEEN.Tween(pivot.rotation)
                    .to({ [activeAxis]: targetAngle }, 120)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onComplete(() => {
                        finalizeRotation(true); 
                        isAnimating = true; 
                        performRandomMove();
                    })
                    .start();
            }
            performRandomMove();
        }

        function resetCube() {
            if (isAnimating || isDragging) return;
            pauseAutoSolve();
            document.getElementById('solution-card').classList.add('hidden');
            moveHistory = [];

            const inPivot = pivot.children.slice();
            inPivot.forEach(c => cubeGroup.attach(c));
            pivot.rotation.set(0,0,0);

            cubies.forEach(c => {
                c.position.set(c.userData.initialX, c.userData.initialY, c.userData.initialZ);
                c.rotation.set(0, 0, 0);
                c.updateMatrix();
            });
            controls.reset();
            // Reset Target position 
            controls.target.set(getOffsetX(), 0, 0);
        }

        function generateSolution() {
            if (isAnimating || isDragging) return;

            if (moveHistory.length === 0) {
                alert("Cube is already solved!");
                return;
            }

            pauseAutoSolve();
            
            solutionSequence = moveHistory.slice().reverse().map(m => {
                let revTurns = -m.turns;
                if (revTurns === -3) revTurns = 1;
                if (revTurns === 3) revTurns = -1;
                if (revTurns === -2) revTurns = 2;

                return {
                    axis: m.axis,
                    slice: m.slice,
                    angle: revTurns * (Math.PI / 2), 
                    notation: getMoveNotation(m.axis, m.slice, revTurns * (Math.PI / 2))
                };
            }).filter(m => m.notation !== null);

            currentStepIndex = 0;
            renderSolutionUI();
        }

        function renderSolutionUI() {
            const card = document.getElementById('solution-card');
            const textDiv = document.getElementById('solution-text');
            const badgesDiv = document.getElementById('solution-badges');
            const countSpan = document.getElementById('moves-count');

            card.classList.remove('hidden');
            countSpan.innerText = `${solutionSequence.length} moves`;
            countSpan.className = "bg-[#f0f2f5] text-gray-600 text-[13px] py-1.5 px-3 rounded-full font-bold shadow-inner";
            
            textDiv.innerText = solutionSequence.map(s => s.notation).join('  ');
            
            badgesDiv.innerHTML = '';
            solutionSequence.forEach((step, idx) => {
                const badge = document.createElement('div');
                badge.innerText = step.notation;
                badge.id = `badge-${idx}`;
                badge.className = 'bg-[#f0f2f5] text-gray-700 rounded-lg px-3.5 py-1.5 font-mono font-bold text-sm shadow-sm transition-all duration-300';
                badgesDiv.appendChild(badge);
            });
            
            updateBadgesUI();
        }

        function updateBadgesUI() {
            solutionSequence.forEach((_, idx) => {
                const badge = document.getElementById(`badge-${idx}`);
                if (!badge) return;
                
                if (idx < currentStepIndex) {
                    badge.className = 'bg-gray-100 text-gray-400 rounded-lg px-3.5 py-1.5 font-mono font-bold text-sm shadow-sm opacity-50';
                } else if (idx === currentStepIndex) {
                    badge.className = 'bg-[#ab5af4] text-white rounded-lg px-3.5 py-1.5 font-mono font-bold text-sm shadow-md transform scale-110';
                    badge.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    badge.className = 'bg-[#f0f2f5] text-gray-700 rounded-lg px-3.5 py-1.5 font-mono font-bold text-sm shadow-sm';
                }
            });
        }

        // دالة يتم استدعاؤها عند انتهاء الحل بنجاح لإظهار كلمة Solved
        function markAsSolved() {
            pauseAutoSolve();
            moveHistory = []; 
            controls.enabled = true;
            
            // Fail-safe Snapping: إعادة تعيين قوية لكل الإحداثيات للتأكد من عدم وجود أي خطأ بصري
            cubies.forEach(c => {
                const elements = c.matrix.elements;
                for (let i = 0; i < 16; i++) elements[i] = Math.round(elements[i]);
                c.matrix.decompose(c.position, c.quaternion, c.scale);
            });

            const countSpan = document.getElementById('moves-count');
            countSpan.innerText = "Solved!";
            countSpan.className = "bg-[#1cc065] text-white text-[13px] py-1.5 px-3 rounded-full font-bold shadow-inner";
        }

        function playNextStep() {
            if (isAnimating) return; // منع التداخل بشكل كامل!
            
            if (currentStepIndex >= solutionSequence.length) {
                markAsSolved();
                return;
            }

            isAnimating = true;
            controls.enabled = false;
            updateBadgesUI();

            const step = solutionSequence[currentStepIndex];
            activeAxis = step.axis;
            activeSlice = step.slice;

            pivot.rotation.set(0, 0, 0);
            pivot.updateMatrixWorld();
            
            const cubiesToMove = cubies.filter(c => Math.round(c.position[activeAxis]) === activeSlice);
            cubiesToMove.forEach(c => pivot.attach(c));

            new TWEEN.Tween(pivot.rotation)
                .to({ [activeAxis]: step.angle }, 300)
                .easing(TWEEN.Easing.Quadratic.InOut)
                .onComplete(() => {
                    finalizeRotation(false); 
                    currentStepIndex++;
                    updateBadgesUI();
                    
                    // استخدام setTimeout لضمان أن كل المتغيرات استقرت قبل استدعاء الخطوة التالية
                    setTimeout(() => {
                        if (isAutoSolving && currentStepIndex < solutionSequence.length) {
                            playNextStep();
                        } else if (currentStepIndex >= solutionSequence.length) {
                            markAsSolved();
                        } else {
                            controls.enabled = true;
                        }
                    }, 50);
                })
                .start();
        }

        function toggleAutoSolve() {
            if (solutionSequence.length === 0) return;
            if (isAutoSolving) {
                pauseAutoSolve();
            } else {
                isAutoSolving = true;
                playNextStep();
            }
        }

        function pauseAutoSolve() {
            isAutoSolving = false;
            clearTimeout(autoSolveTimer);
        }

        document.getElementById('btn-scramble').addEventListener('click', scramble);
        document.getElementById('btn-reset').addEventListener('click', resetCube);
        document.getElementById('btn-solution').addEventListener('click', generateSolution);
        document.getElementById('btn-next').addEventListener('click', () => { pauseAutoSolve(); playNextStep(); });
        document.getElementById('btn-auto').addEventListener('click', toggleAutoSolve);
        document.getElementById('btn-pause').addEventListener('click', pauseAutoSolve);
        document.getElementById('btn-resume').addEventListener('click', () => { if(!isAutoSolving && solutionSequence.length > 0) toggleAutoSolve(); });

        document.getElementById('ui-panel').addEventListener('pointerdown', (e) => e.stopPropagation());
        document.getElementById('ui-panel').addEventListener('wheel', (e) => e.stopPropagation());

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const newOffset = getOffsetX();
            cubeGroup.position.x = newOffset;
            controls.target.set(newOffset, 0, 0); // الحفاظ على مركزية الدوران عند تغيير الحجم
            controls.update();
        });

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = animate;
    </script>
</body>
</html>
